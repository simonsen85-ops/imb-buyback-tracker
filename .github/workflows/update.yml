name: Update IMB Buyback Tracker

on:
  schedule:
    # Hverdage kl. 17:30 UTC (efter LSE lukker 16:30 GMT/17:30 BST)
    - cron: '30 17 * * 1-5'
  workflow_dispatch:  # Manuel kørsel

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run scraper & rebuild HTML
        run: python scripts/scraper.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html
          git diff --staged --quiet || git commit -m "📊 Auto-update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
