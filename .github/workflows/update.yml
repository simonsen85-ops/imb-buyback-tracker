name: Opdater IMB Buyback Tracker

on:
  schedule:
    - cron: '30 17 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Kør scraper
        run: python scraper.py

      - name: Byg HTML
        run: python build_html.py

      - name: Commit og push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html
          git diff --staged --quiet || git commit -m "📊 IMB buyback opdateret $(date -u +%Y-%m-%d)"
          git push
