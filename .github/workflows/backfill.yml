name: Backfill Historical IMB Buyback Data

on:
  workflow_dispatch:
    inputs:
      num_pages:
        description: 'ADVFN listing pages to paginate (5=3-4 months, 10=1 year, 20=full FY24-FY26)'
        required: true
        default: '10'
        type: string

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run historical backfill
        run: python scripts/scraper.py --backfill ${{ github.event.inputs.num_pages }}

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html
          git diff --staged --quiet || git commit -m "🔙 Backfill ${{ github.event.inputs.num_pages }} ADVFN pages $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
